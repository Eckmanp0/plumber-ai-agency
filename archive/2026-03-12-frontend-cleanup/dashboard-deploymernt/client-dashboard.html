<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #122027;
      --muted: #5e6d75;
      --paper: #f2f5f7;
      --panel: #ffffff;
      --line: rgba(18, 32, 39, 0.09);
      --accent: #0b7a75;
      --accent-2: #eb6b2d;
      --shadow: 0 18px 36px rgba(18, 32, 39, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(11,122,117,0.11), transparent 26%),
        linear-gradient(180deg, #f8fbfc 0%, #eef3f5 100%);
      min-height: 100vh;
    }

    header {
      padding: 28px 24px 12px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.03em;
    }

    .subtitle { color: var(--muted); margin-top: 8px; }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 24px 40px;
    }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    button, select {
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 12px 14px;
      background: var(--panel);
      color: var(--ink);
      font-weight: 600;
    }

    button.primary {
      background: var(--accent);
      color: white;
      border: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin: 24px 0;
    }

    .card, .table-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .card {
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: auto -14px -24px auto;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(235, 107, 45, 0.08);
    }

    .metric-label { color: var(--muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .metric-value { font-size: 2.2rem; margin-top: 10px; font-weight: 700; }

    .layout {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 18px;
    }

    .table-card { padding: 18px; }
    .table-card h2, .side-card h2 { margin: 0 0 12px; font-size: 1.1rem; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .side-stack { display: grid; gap: 18px; }
    .side-card {
      padding: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.82rem;
      background: rgba(11,122,117,0.12);
      color: var(--accent);
    }

    .status, .empty {
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.6;
    }

    .hidden { display: none; }

    @media (max-width: 980px) {
      .grid, .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="topbar">
        <div>
          <h1>Client Operations</h1>
          <div class="subtitle" id="tenantSummary">Loading tenant workspace...</div>
        </div>
        <div class="actions">
          <select id="tenantSelect"></select>
          <button id="refreshBtn">Refresh</button>
          <button id="signOutBtn" class="primary">Sign Out</button>
        </div>
      </div>
      <div class="status" id="status"></div>
    </header>

    <section class="grid">
      <article class="card"><div class="metric-label">New Leads</div><div class="metric-value" id="metricLeads">0</div></article>
      <article class="card"><div class="metric-label">Booked Jobs</div><div class="metric-value" id="metricBooked">0</div></article>
      <article class="card"><div class="metric-label">Calls Logged</div><div class="metric-value" id="metricCalls">0</div></article>
      <article class="card"><div class="metric-label">Package</div><div class="metric-value" id="metricPackage">Pilot</div></article>
    </section>

    <section class="layout">
      <article class="table-card">
        <h2>Lead Feed</h2>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Phone</th>
              <th>Address</th>
              <th>Issue</th>
              <th>Urgency</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="leadTable"></tbody>
        </table>
        <div class="empty hidden" id="leadEmpty">No leads are visible for this tenant yet.</div>
      </article>

      <div class="side-stack">
        <article class="side-card">
          <h2>Feature Access</h2>
          <div id="featureFlags"></div>
        </article>
        <article class="side-card">
          <h2>Recent Calls</h2>
          <div id="callList"></div>
        </article>
        <article class="side-card">
          <h2>Membership</h2>
          <div id="memberRole"></div>
        </article>
      </div>
    </section>
  </div>

  <script>
    const SUPABASE_URL = "https://lxkfjannfjfetfjfwuaf.supabase.co";
    const SUPABASE_KEY = "sb_publishable_hmYHicDbdl4xpuo5WQ9RLQ_bu24mUdD";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentMemberships = [];
    let currentClient = null;

    async function requireSession() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) {
        window.location.href = "login.html";
        return null;
      }
      return data.session;
    }

    async function loadMemberships() {
      const { data, error } = await supabaseClient
        .from("tenant_users")
        .select("tenant_id, role, tenants(id, name, package_tier), clients(id, business_name, package_tier, feature_flags_json)")
        .order("created_at", { ascending: true });

      if (error) throw error;
      currentMemberships = data || [];

      const select = document.getElementById("tenantSelect");
      select.innerHTML = "";
      currentMemberships.forEach((membership, index) => {
        const option = document.createElement("option");
        const tenantName = membership.tenants?.name || membership.clients?.business_name || `Tenant ${index + 1}`;
        option.value = membership.tenant_id;
        option.textContent = tenantName;
        select.appendChild(option);
      });

      if (!currentMemberships.length) {
        document.getElementById("status").textContent = "Signed in, but no tenant membership was found yet.";
      }
    }

    function renderFeatures(flags = {}) {
      const container = document.getElementById("featureFlags");
      const entries = Object.entries(flags);
      if (!entries.length) {
        container.innerHTML = '<div class="empty">No feature flags saved for this tenant yet.</div>';
        return;
      }
      container.innerHTML = entries.map(([key, enabled]) => {
        const label = key.replace(/_/g, " ");
        return `<div class="status"><span class="pill">${enabled ? "Enabled" : "Disabled"}</span> ${label}</div>`;
      }).join("");
    }

    function renderCalls(calls = []) {
      const container = document.getElementById("callList");
      if (!calls.length) {
        container.innerHTML = '<div class="empty">No recent calls yet.</div>';
        return;
      }
      container.innerHTML = calls.map((call) => `
        <div class="status">
          <strong>${call.call_outcome || call.ended_reason || "completed"}</strong><br />
          ${call.summary || "No summary captured yet."}
        </div>
      `).join("");
    }

    function renderLeads(leads = []) {
      const table = document.getElementById("leadTable");
      const empty = document.getElementById("leadEmpty");
      table.innerHTML = leads.map((lead) => `
        <tr>
          <td>${lead.caller_name || ""}</td>
          <td>${lead.caller_phone || ""}</td>
          <td>${lead.service_address || ""}</td>
          <td>${lead.issue_description || ""}</td>
          <td>${lead.urgency_level || ""}</td>
          <td>${lead.status || ""}</td>
        </tr>
      `).join("");
      empty.classList.toggle("hidden", leads.length > 0);
    }

    async function loadTenantData() {
      const tenantId = document.getElementById("tenantSelect").value;
      const membership = currentMemberships.find((item) => item.tenant_id === tenantId);
      currentClient = membership?.clients || null;

      if (!tenantId || !currentClient?.id) return;

      document.getElementById("memberRole").innerHTML = `
        <div class="status"><span class="pill">${membership.role}</span> ${membership.tenants?.name || currentClient.business_name}</div>
      `;
      document.getElementById("tenantSummary").textContent = `${currentClient.business_name || membership.tenants?.name} | ${membership.role}`;
      document.getElementById("metricPackage").textContent = (currentClient.package_tier || membership.tenants?.package_tier || "pilot").replace("_", " ");
      renderFeatures(currentClient.feature_flags_json || {});

      const [leadRes, callRes] = await Promise.all([
        supabaseClient
          .from("leads")
          .select("caller_name, caller_phone, service_address, issue_description, urgency_level, status", { count: "exact" })
          .eq("tenant_id", tenantId)
          .order("created_at", { ascending: false })
          .limit(12),
        supabaseClient
          .from("calls")
          .select("summary, call_outcome, ended_reason", { count: "exact" })
          .eq("tenant_id", tenantId)
          .order("created_at", { ascending: false })
          .limit(5)
      ]);

      if (leadRes.error) throw leadRes.error;
      if (callRes.error) throw callRes.error;

      const leads = leadRes.data || [];
      const calls = callRes.data || [];
      renderLeads(leads);
      renderCalls(calls);

      document.getElementById("metricLeads").textContent = String(leads.filter((lead) => lead.status === "new").length);
      document.getElementById("metricBooked").textContent = String(leads.filter((lead) => lead.status === "booked").length);
      document.getElementById("metricCalls").textContent = String(callRes.count || calls.length || 0);
      document.getElementById("status").textContent = "";
    }

    async function init() {
      try {
        await requireSession();
        await loadMemberships();
        if (currentMemberships.length) {
          await loadTenantData();
        }
      } catch (error) {
        document.getElementById("status").textContent = error.message;
      }
    }

    document.getElementById("tenantSelect").addEventListener("change", loadTenantData);
    document.getElementById("refreshBtn").addEventListener("click", loadTenantData);
    document.getElementById("signOutBtn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "login.html";
    });

    init();
  </script>
</body>
</html>
